name: Validate Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]

env:
  # space-separated list; add more folders/files here
  PATHS_FOR_SO_VALIDATION: "src/ infra/ .github/workflows/ package.json"

jobs:
  identify:
    name: Identify required steps
    runs-on: ubuntu-latest
    outputs:
      run_so_validation: ${{ steps.detect.outputs.run_so_validation }}
    steps:
      - name: Checkout PR head (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Detect if run SO validation
        id: detect
        shell: bash
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          DIFF_FROM="$BASE_SHA"
          [[ "${{ github.event.action }}" == "synchronize" ]] && DIFF_FROM="${{ github.event.before }}"

          run_so_validation=true

          for file in $(git diff --name-only "$DIFF_FROM" "$HEAD_SHA"); do
            match=false
            for path in $PATHS_FOR_SO_VALIDATION; do
              [[ "$file" == "$path"* || "$file" == "$path" ]] && match=true
            done
            [[ "$match" == false ]] && run_so_validation=false && break
          done

          echo "run_so_validation=$run_so_validation" >> "$GITHUB_OUTPUT"

  validate_against_so:
    name: Validate against scratch org
    needs: identify
    if: needs.identify.outputs.run_so_validation == 'true'
    uses: jurijvovcuk-ext44721/jurijTest/.github/workflows/validate-against-so.yml@main

  required_checks:
    name: All required steps check
    runs-on: ubuntu-latest
    needs: [identify, validate_against_so]
    if: always()
    steps:
      - name: Gate
        shell: bash
        run: |
          req="${{ needs.identify.outputs.run_so_validation }}"
          res="${{ needs.validate_against_so.result }}"

          if [[ "$req" == "true" && "$res" != "success" ]]; then
            echo "::error::validate_against_so was required but result=$res"
            exit 1
          fi

          echo "Gate passed."
